name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-14
            target: darwin-arm64
            bun_target: bun-darwin-arm64
            output: browse-darwin-arm64
          - runner: macos-14
            target: darwin-x86_64
            bun_target: bun-darwin-x64
            output: browse-darwin-x86_64
          - runner: ubuntu-latest
            target: linux-x86_64
            output: browse-linux-x86_64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            output: browse-linux-arm64
          - runner: windows-latest
            target: windows-x86_64
            output: browse-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Build (non-Windows)
        if: matrix.runner != 'windows-latest'
        env:
          BUN_TARGET: ${{ matrix.bun_target }}
        run: |
          TARGET_FLAG=${BUN_TARGET:+--target=$BUN_TARGET}
          bun build --compile src/cli.ts --outfile dist/browse $TARGET_FLAG
          bun build --compile src/find-browse.ts --outfile dist/find-browse $TARGET_FLAG
          bun build src/server.ts --outfile dist/server.mjs --target=bun --external playwright --external playwright-core
          bash scripts/build-node-server.sh

      - name: Build (Windows)
        if: matrix.runner == 'windows-latest'
        run: bun run build

      - name: Write version file (non-Windows)
        if: matrix.runner != 'windows-latest'
        run: echo "${GITHUB_REF_NAME#v} ($(git rev-parse --short HEAD))" > dist/.version

      - name: Write version file (Windows)
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v',''
          $sha = (git rev-parse --short HEAD)
          "$tag ($sha)" | Out-File -FilePath dist/.version -Encoding ascii -NoNewline

      - name: Build agent add-on (non-Windows)
        if: matrix.runner != 'windows-latest'
        env:
          BUN_TARGET: ${{ matrix.bun_target }}
        run: |
          TARGET_FLAG=${BUN_TARGET:+--target=$BUN_TARGET}
          bun build --compile src/sidebar-agent-main.ts --outfile dist/browse-agent $TARGET_FLAG
          bun build src/sidebar-agent.ts --outfile dist/sidebar-agent.mjs --target=bun

      - name: Build agent add-on (Windows)
        if: matrix.runner == 'windows-latest'
        run: bun run build:agent

      - name: Verify macOS code signatures
        if: startsWith(matrix.target, 'darwin')
        run: |
          for bin in dist/browse dist/browse-agent; do
            echo "--- $bin ---"
            codesign -dv "$bin" 2>&1
            codesign -v --verbose "$bin" 2>&1 || true
          done

      - name: Package (non-Windows)
        if: matrix.runner != 'windows-latest'
        run: |
          cp -r extension dist/extension
          cd dist
          tar czf ../${{ matrix.output }}.tar.gz browse server.mjs .version extension
          tar czf ../browse-agent-${{ matrix.target }}.tar.gz browse-agent sidebar-agent.mjs

      - name: Package (Windows)
        if: matrix.runner == 'windows-latest'
        shell: bash
        run: |
          cd dist
          tar czf ../${{ matrix.output }}.tar.gz browse.exe server-node.mjs bun-polyfill.cjs
          tar czf ../browse-agent-${{ matrix.target }}.tar.gz browse-agent.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: |
            ${{ matrix.output }}.tar.gz
            browse-agent-${{ matrix.target }}.tar.gz

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract version tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            browse-darwin-arm64.tar.gz \
            browse-darwin-x86_64.tar.gz \
            browse-linux-x86_64.tar.gz \
            browse-linux-arm64.tar.gz \
            browse-windows-x86_64.tar.gz \
            browse-agent-darwin-arm64.tar.gz \
            browse-agent-darwin-x86_64.tar.gz \
            browse-agent-linux-x86_64.tar.gz \
            browse-agent-linux-arm64.tar.gz \
            browse-agent-windows-x86_64.tar.gz \
            --generate-notes \
            --title "browse v$VERSION"

      - name: Compute SHA256 checksums
        run: |
          for f in browse-darwin-arm64.tar.gz browse-darwin-x86_64.tar.gz browse-linux-x86_64.tar.gz browse-linux-arm64.tar.gz; do
            sha256sum "$f" | awk '{print $1}' > "${f%.tar.gz}.sha256"
          done
          for f in browse-agent-darwin-arm64.tar.gz browse-agent-darwin-x86_64.tar.gz browse-agent-linux-x86_64.tar.gz browse-agent-linux-arm64.tar.gz; do
            sha256sum "$f" | awk '{print $1}' > "${f%.tar.gz}.sha256"
          done

      - name: Clone tap repo
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/juanheyns/homebrew-tap.git tap

      - name: Update browse.rb
        run: |
          VERSION="${{ env.VERSION }}"
          SHA_DARWIN_ARM=$(cat browse-darwin-arm64.sha256)
          SHA_DARWIN_X86=$(cat browse-darwin-x86_64.sha256)
          SHA_LINUX_X86=$(cat browse-linux-x86_64.sha256)
          SHA_LINUX_ARM=$(cat browse-linux-arm64.sha256)
          sed -i "s|version \".*\"|version \"${VERSION}\"|g" tap/Formula/browse.rb
          sed -i "/darwin-arm64/,/sha256/{s|url \".*\"|url \"https://github.com/juanheyns/gstack-browse/releases/download/v${VERSION}/browse-darwin-arm64.tar.gz\"|}" tap/Formula/browse.rb
          sed -i "/darwin-arm64/,/sha256/{s|sha256 \".*\"|sha256 \"${SHA_DARWIN_ARM}\"|}" tap/Formula/browse.rb
          sed -i "/darwin-x86_64/,/sha256/{s|url \".*\"|url \"https://github.com/juanheyns/gstack-browse/releases/download/v${VERSION}/browse-darwin-x86_64.tar.gz\"|}" tap/Formula/browse.rb
          sed -i "/darwin-x86_64/,/sha256/{s|sha256 \".*\"|sha256 \"${SHA_DARWIN_X86}\"|}" tap/Formula/browse.rb
          sed -i "/linux-x86_64/,/sha256/{s|url \".*\"|url \"https://github.com/juanheyns/gstack-browse/releases/download/v${VERSION}/browse-linux-x86_64.tar.gz\"|}" tap/Formula/browse.rb
          sed -i "/linux-x86_64/,/sha256/{s|sha256 \".*\"|sha256 \"${SHA_LINUX_X86}\"|}" tap/Formula/browse.rb
          sed -i "/linux-arm64/,/sha256/{s|url \".*\"|url \"https://github.com/juanheyns/gstack-browse/releases/download/v${VERSION}/browse-linux-arm64.tar.gz\"|}" tap/Formula/browse.rb
          sed -i "/linux-arm64/,/sha256/{s|sha256 \".*\"|sha256 \"${SHA_LINUX_ARM}\"|}" tap/Formula/browse.rb

      - name: Update browse-agent.rb
        run: |
          VERSION="${{ env.VERSION }}"
          SHA_AGENT_DARWIN_ARM=$(cat browse-agent-darwin-arm64.sha256)
          SHA_AGENT_DARWIN_X86=$(cat browse-agent-darwin-x86_64.sha256)
          SHA_AGENT_LINUX_X86=$(cat browse-agent-linux-x86_64.sha256)
          SHA_AGENT_LINUX_ARM=$(cat browse-agent-linux-arm64.sha256)
          sed -i "s|version \".*\"|version \"${VERSION}\"|g" tap/Formula/browse-agent.rb
          sed -i "/darwin-arm64/,/sha256/{s|url \".*\"|url \"https://github.com/juanheyns/gstack-browse/releases/download/v${VERSION}/browse-agent-darwin-arm64.tar.gz\"|}" tap/Formula/browse-agent.rb
          sed -i "/darwin-arm64/,/sha256/{s|sha256 \".*\"|sha256 \"${SHA_AGENT_DARWIN_ARM}\"|}" tap/Formula/browse-agent.rb
          sed -i "/darwin-x86_64/,/sha256/{s|url \".*\"|url \"https://github.com/juanheyns/gstack-browse/releases/download/v${VERSION}/browse-agent-darwin-x86_64.tar.gz\"|}" tap/Formula/browse-agent.rb
          sed -i "/darwin-x86_64/,/sha256/{s|sha256 \".*\"|sha256 \"${SHA_AGENT_DARWIN_X86}\"|}" tap/Formula/browse-agent.rb
          sed -i "/linux-x86_64/,/sha256/{s|url \".*\"|url \"https://github.com/juanheyns/gstack-browse/releases/download/v${VERSION}/browse-agent-linux-x86_64.tar.gz\"|}" tap/Formula/browse-agent.rb
          sed -i "/linux-x86_64/,/sha256/{s|sha256 \".*\"|sha256 \"${SHA_AGENT_LINUX_X86}\"|}" tap/Formula/browse-agent.rb
          sed -i "/linux-arm64/,/sha256/{s|url \".*\"|url \"https://github.com/juanheyns/gstack-browse/releases/download/v${VERSION}/browse-agent-linux-arm64.tar.gz\"|}" tap/Formula/browse-agent.rb
          sed -i "/linux-arm64/,/sha256/{s|sha256 \".*\"|sha256 \"${SHA_AGENT_LINUX_ARM}\"|}" tap/Formula/browse-agent.rb

      - name: Commit and push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/browse.rb Formula/browse-agent.rb
          git commit -m "browse ${{ env.VERSION }}"
          git push
